<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@keyframes ll-orbit { to { transform: rotate(360deg); } }
@keyframes ll-node-pulse { 0%,100% { opacity:.3; transform:scale(.75); } 50% { opacity:1; transform:scale(1.15); } }
@keyframes ll-core-pulse { 0%,100% { opacity:.55; } 50% { opacity:1; } }
</style>
</helmet>
<div style="{{ wrapStyle }}" role="status" aria-live="polite" aria-label="{{ label }}">
  <div style="{{ ringBoxStyle }}">
    <div style="{{ spinnerStyle }}">
      <sc-for list="{{ nodes }}" as="node" hint-placeholder-count="3">
        <span style="{{ node.style }}"></span>
      </sc-for>
    </div>
    <span style="{{ coreStyle }}"></span>
  </div>
  <sc-if value="{{ label }}" hint-placeholder-val="">
    <span style="{{ labelStyle }}">{{ label }}</span>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:180,&quot;height&quot;:120},&quot;size&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:48,&quot;min&quot;:16,&quot;max&quot;:96,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F05A22&quot;,&quot;options&quot;:[&quot;#F05A22&quot;,&quot;#595959&quot;,&quot;#009995&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;nodeCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:3,&quot;max&quot;:8,&quot;tsType&quot;:&quot;number&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Searching PubMed…&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const font = "Tahoma, Verdana, Geneva, 'DejaVu Sans', sans-serif";
    const size = Number(p.size) || 48;
    const color = p.color || '#F05A22';
    const count = Math.max(3, Number(p.nodeCount) || 3);
    const dot = Math.max(4, size * 0.16);
    const radius = size / 2 - dot / 2;
    const nodes = [];
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * 2 * Math.PI - Math.PI / 2;
      const x = size / 2 + radius * Math.cos(ang) - dot / 2;
      const y = size / 2 + radius * Math.sin(ang) - dot / 2;
      nodes.push({
        style: {
          position: 'absolute', left: x + 'px', top: y + 'px',
          width: dot + 'px', height: dot + 'px', borderRadius: '50%',
          background: color, transformOrigin: 'center',
          animation: `ll-node-pulse 1.3s ${(i / count) * 1.3}s ease-in-out infinite`,
        },
      });
    }
    return {
      label: p.label || '',
      nodes,
      wrapStyle: { display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: '12px', fontFamily: font },
      ringBoxStyle: { position: 'relative', width: size + 'px', height: size + 'px' },
      spinnerStyle: { position: 'absolute', inset: 0, animation: 'll-orbit 1.6s linear infinite' },
      coreStyle: {
        position: 'absolute', left: '50%', top: '50%', width: dot * 0.7 + 'px', height: dot * 0.7 + 'px',
        marginLeft: -(dot * 0.35) + 'px', marginTop: -(dot * 0.35) + 'px',
        borderRadius: '50%', background: color, animation: 'll-core-pulse 1.3s ease-in-out infinite',
      },
      labelStyle: { fontSize: '13px', color: '#595959', letterSpacing: '.01em', fontFamily: font },
    };
  }
}
</script>
</body>
</html>
