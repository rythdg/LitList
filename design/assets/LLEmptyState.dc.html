<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ wrapStyle }}">
  <div style="{{ iconBox }}">
    <sc-if value="{{ isNoResults }}" hint-placeholder-val="{{ true }}">
      <svg viewBox="0 0 48 48" fill="none" style="{{ iconStyle }}"><circle cx="21" cy="21" r="13" stroke="#B3B3B3" stroke-width="2"></circle><path d="M30.5 30.5L39 39" stroke="#B3B3B3" stroke-width="2" stroke-linecap="round"></path><path d="M16 21h10" stroke="#D9D9D9" stroke-width="2" stroke-linecap="round"></path></svg>
    </sc-if>
    <sc-if value="{{ isNothingSaved }}" hint-placeholder-val="">
      <svg viewBox="0 0 48 48" fill="none" style="{{ iconStyle }}"><path d="M24 39s-11-6.6-14-13C7.7 20.6 9.6 15 14.7 14.3c2.9-.4 5.6.9 7.1 3 1.4-2.1 4.2-3.4 7.1-3C34 15 35.9 20.6 33.6 26 30.6 32.4 24 39 24 39z" stroke="#B3B3B3" stroke-width="2" stroke-linejoin="round"></path></svg>
    </sc-if>
    <sc-if value="{{ isOffline }}" hint-placeholder-val="">
      <svg viewBox="0 0 48 48" fill="none" style="{{ iconStyle }}"><path d="M8 18a22 22 0 0132 0M14 25a13 13 0 0120 0M20 32a5 5 0 018 0" stroke="#B3B3B3" stroke-width="2" stroke-linecap="round"></path><path d="M39 9L9 39" stroke="#AB0C23" stroke-width="2" stroke-linecap="round"></path></svg>
    </sc-if>
  </div>
  <h3 style="{{ titleStyle }}">{{ title }}</h3>
  <p style="{{ msgStyle }}">{{ message }}</p>
  <sc-if value="{{ actionLabel }}" hint-placeholder-val="">
    <button type="button" onClick="{{ onAction }}" style="{{ actionStyle }}" style-hover="{{ actionHover }}">{{ actionLabel }}</button>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:260},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;no-results&quot;,&quot;options&quot;:[&quot;no-results&quot;,&quot;nothing-saved&quot;,&quot;offline&quot;],&quot;tsType&quot;:&quot;'no-results'|'nothing-saved'|'offline'&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;No papers matched&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;message&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Swipe down to try a different search.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;actionLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onAction&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const font = "Tahoma, Verdana, Geneva, 'DejaVu Sans', sans-serif";
    const variant = p.variant || 'no-results';
    return {
      title: p.title || 'No papers matched',
      message: p.message || 'Swipe down to try a different search.',
      actionLabel: p.actionLabel || '',
      onAction: p.onAction,
      isNoResults: variant === 'no-results',
      isNothingSaved: variant === 'nothing-saved',
      isOffline: variant === 'offline',
      wrapStyle: {
        display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: '10px',
        padding: '40px 28px', maxWidth: '340px', margin: '0 auto', fontFamily: font,
      },
      iconBox: { marginBottom: '6px' },
      iconStyle: { width: '56px', height: '56px' },
      titleStyle: { font: `600 19px/1.3 ${font}`, color: '#1A1A1A', margin: 0 },
      msgStyle: { font: `400 15px/1.5 ${font}`, color: '#595959', margin: 0, maxWidth: '30ch' },
      actionStyle: {
        marginTop: '10px', border: '1px solid #D9D9D9', background: '#fff', color: '#1A1A1A',
        borderRadius: '8px', padding: '10px 18px', cursor: 'pointer', font: `600 14px/1 ${font}`, transition: 'background .15s',
      },
      actionHover: { background: '#F2F2F2' },
    };
  }
}
</script>
</body>
</html>
