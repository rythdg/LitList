<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ rowStyle }}">
  <div style="{{ textWrap }}">
    <span style="{{ titleStyle }}">{{ title }}</span>
    <span style="{{ metaStyle }}">{{ meta }}</span>
  </div>
  <button type="button" onClick="{{ onRemove }}" aria-label="{{ removeLabel }}" style="{{ removeStyle }}" style-hover="{{ removeHover }}">
    <svg viewBox="0 0 24 24" fill="none" style="{{ iconStyle }}" aria-hidden="true"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
  </button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:72},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Spiking Neural Networks for Real-Time Neuromorphic Inference&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;meta&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Smith et al. · 2025&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onRemove&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const font = "Tahoma, Verdana, Geneva, 'DejaVu Sans', sans-serif";
    return {
      title: p.title || 'Untitled paper',
      meta: p.meta || '',
      removeLabel: 'Remove ' + (p.title || 'paper') + ' from saved list',
      onRemove: p.onRemove,
      rowStyle: {
        display: 'flex', alignItems: 'center', gap: '12px', width: '100%', boxSizing: 'border-box',
        padding: '14px 4px 14px 2px', borderBottom: '1px solid #EDEDEA', fontFamily: font,
      },
      textWrap: { flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: '3px' },
      titleStyle: {
        font: `500 15px/1.35 ${font}`, color: '#1A1A1A', overflow: 'hidden', textOverflow: 'ellipsis',
        display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',
      },
      metaStyle: { font: `400 13px/1.3 ${font}`, color: '#595959' },
      removeStyle: {
        flex: 'none', width: '34px', height: '34px', borderRadius: '50%', border: '1px solid #EDEDEA',
        background: '#fff', color: '#B3B3B3', cursor: 'pointer', display: 'inline-flex',
        alignItems: 'center', justifyContent: 'center', transition: 'background .15s, color .15s, border-color .15s',
      },
      removeHover: { background: '#FBEDEF', color: '#AB0C23', borderColor: '#E4B7BE' },
      iconStyle: { width: '15px', height: '15px' },
    };
  }
}
</script>
</body>
</html>
