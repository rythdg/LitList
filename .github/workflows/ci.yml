# PR-gate CI (BuildPlan.md Task 5B, SPEC.md §12.4).
#
# Runs on every pull request. Blocks merge on failure via GitHub's
# required-status-checks branch protection (a repo *setting*, not
# something a workflow file can turn on itself — see the human
# TODO at the bottom of this file).
#
# Two independent jobs (backend/frontend) mirror the fact that they are
# two separate stacks with separate lint/type/test tooling (§12.4); a
# failure in either job fails the overall workflow run/check.
name: PR checks

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR to avoid burning CI minutes on
# stale pushes.
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend + dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy app

      - name: pytest
        run: pytest

  frontend:
    name: Frontend (tsc, eslint, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc -b --noEmit)
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

# ---------------------------------------------------------------------
# HUMAN SETUP REQUIRED (cannot be done from a workflow file):
# To make this workflow actually *block* merges (not just report status),
# go to:
#   Settings -> Branches -> add/edit a branch protection rule for `main`
#   -> enable "Require status checks to pass before merging"
#   -> search for and require BOTH:
#       "PR checks / Backend (ruff, mypy, pytest)"
#       "PR checks / Frontend (tsc, eslint, vitest)"
# (These check names only appear in that search box after this workflow
# has run at least once on an open PR.)
# ---------------------------------------------------------------------
